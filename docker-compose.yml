version: "3.9"

services:
  prism:
    build: .
    ports:
      - "3000:3000"    # Web UI + REST API
      - "8080:8080"    # MITM Proxy
    volumes:
      - ./data:/data
      - ./scripts:/scripts:ro
    environment:
      - PRISM_DB_PATH=/data/prism.db
      - PRISM_DATA_DIR=/data
      - PRISM_CERTS_DIR=/data/certs
      - PRISM_SCRIPTS_DIR=/scripts
      - PRISM_UPLOADS_DIR=/data/uploads
      - PRISM_MITM_HOST=0.0.0.0
      - PRISM_MITM_PORT=8080
      - SSLKEYLOGFILE=/data/sslkeys.log
      - PRISM_REDACT_SECRETS=true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
